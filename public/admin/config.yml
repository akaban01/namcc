backend:
  name: git-gateway
  branch: main

local_backend:
  url: "http://localhost:8082/api/v1"

media_folder: "public/images"
public_folder: "/images"

publish_mode: editorial_workflow

site_url: https://namcc.org
display_url: https://namcc.org
logo_url: /images/namcc-logo.svg

collections:
  - name: "settings"
    label: "Site Settings"
    files:
      - name: "site"
        label: "General Settings"
        file: "src/content/settings/site.json"
        fields:
          - { label: "Site Name", name: "siteName", widget: "string" }
          - { label: "Tagline", name: "tagline", widget: "string" }
          - { label: "Address", name: "address", widget: "string" }
          - { label: "Phone", name: "phone", widget: "string" }
          - { label: "Email", name: "email", widget: "string" }
          - { label: "Facebook URL", name: "facebook", widget: "string", required: false }
          - { label: "Twitter URL", name: "twitter", widget: "string", required: false }
          - { label: "Instagram URL", name: "instagram", widget: "string", required: false }
          - { label: "Youtube URL", name: "youtube", widget: "string", required: false }
          - { label: "MP Hall Booking URL", name: "mpHallBookingUrl", widget: "string", required: false }
          - { label: "Eid Fest URL", name: "eidFestUrl", widget: "string", required: false }
          - { label: "Newsletter Signup URL", name: "newsletterUrl", widget: "string", required: false }
          - { label: "Google Maps Embed URL", name: "mapEmbedUrl", widget: "string", required: false }
          - { label: "Copyright Text", name: "copyrightText", widget: "string" }

      - name: "prayer_times"
        label: "Daily Prayer Times"
        file: "src/content/prayerTimes/current.json"
        fields:
          - { label: "Hijri Date", name: "hijriDate", widget: "string", hint: "e.g. 28 Muharram" }
          - { label: "Gregorian Label", name: "gregorianLabel", widget: "string", hint: "e.g. 13 Jul." }
          - { label: "Prayer Schedule Download URL", name: "scheduleDownloadUrl", widget: "string", required: false }
          - { label: "Monthly Schedule URL", name: "monthlyScheduleUrl", widget: "string", required: false }
          - label: "Rows"
            name: "rows"
            widget: "list"
            summary: "{{salaat}} — Adhaan {{adhaan}} / Iqamah {{iqamah}}"
            fields:
              - { label: "Salaat", name: "salaat", widget: "string" }
              - { label: "Adhaan", name: "adhaan", widget: "string" }
              - { label: "Iqamah", name: "iqamah", widget: "string" }

  - name: "jumuah"
    label: "Friday Prayer Schedule"
    folder: "src/content/jumuah"
    extension: "yaml"
    format: "yaml"
    create: true
    identifier_field: "label"
    slug: "{{slug}}"
    fields:
      - { label: "Order", name: "order", widget: "number", value_type: "int" }
      - { label: "Label", name: "label", widget: "string", hint: "e.g. 1st JUMU'AH" }
      - { label: "Time", name: "time", widget: "string" }
      - { label: "Khateeb", name: "khateeb", widget: "string" }
      - { label: "Topic", name: "topic", widget: "string" }

  - name: "events"
    label: "Events"
    folder: "src/content/events"
    extension: "yaml"
    format: "yaml"
    create: true
    identifier_field: "title"
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - label: "Category"
        name: "category"
        widget: "select"
        options: ["General", "Youth", "Sisters", "Ramadan", "Brothers"]
      - { label: "Date", name: "date", widget: "date" }
      - { label: "Time", name: "time", widget: "string", required: false }
      - { label: "Image", name: "image", widget: "image", required: false }
      - { label: "Summary", name: "summary", widget: "text" }
      - { label: "Link", name: "link", widget: "string", required: false }
      - { label: "Featured", name: "featured", widget: "boolean", default: false }

  - name: "imams"
    label: "Imams"
    folder: "src/content/imams"
    extension: "yaml"
    format: "yaml"
    create: true
    identifier_field: "name"
    slug: "{{slug}}"
    fields:
      - { label: "Name", name: "name", widget: "string" }
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Photo", name: "photo", widget: "image", required: false }
      - { label: "Availability", name: "availability", widget: "string", required: false }
      - { label: "Order", name: "order", widget: "number", value_type: "int", default: 0 }
      - { label: "Biography", name: "body", widget: "text", required: false }

  - name: "services"
    label: "Community Services"
    folder: "src/content/services"
    extension: "yaml"
    format: "yaml"
    create: true
    identifier_field: "title"
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "URL Slug", name: "slug", widget: "string", hint: "used in /services/<slug>/" }
      - { label: "Icon", name: "icon", widget: "string", required: false }
      - { label: "Image", name: "image", widget: "image", required: false }
      - { label: "Summary", name: "summary", widget: "text" }
      - { label: "Order", name: "order", widget: "number", value_type: "int", default: 0 }
      - label: "Category"
        name: "category"
        widget: "select"
        options: ["Supportive Services", "Life Events", "Other"]
        default: "Other"
      - { label: "Full Description", name: "body", widget: "text", required: false }

  - name: "announcements"
    label: "Announcements"
    folder: "src/content/announcements"
    extension: "yaml"
    format: "yaml"
    create: true
    identifier_field: "title"
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "date" }
      - { label: "Image", name: "image", widget: "image", required: false }
      - { label: "Summary", name: "summary", widget: "text" }
      - { label: "Full Body", name: "body", widget: "text", required: false }
      - { label: "Link", name: "link", widget: "string", required: false }

  - name: "pages"
    label: "Pages"
    folder: "src/content/pages"
    extension: "md"
    format: "frontmatter"
    create: true
    identifier_field: "title"
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "string", required: false }
      - { label: "Hero Image", name: "heroImage", widget: "image", required: false }
      - { label: "Body", name: "body", widget: "markdown" }
